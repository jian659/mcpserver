services:
  - type: web
    name: placeholder-mcp
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT --forwarded-allow-ips '*'
    envVars:
      - key: API_BASE_URL
        value: https://jsonplaceholder.typicode.com
      - key: API_KEY
        sync: false
